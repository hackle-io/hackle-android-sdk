name: update core sdk
on:
  workflow_dispatch:
    inputs:
      core_version:
        description: 'Core SDK Version'
        required: true

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      core_sdk_name: ${{ steps.version.outputs.core_sdk_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Calculate version
        id: version
        env:
          CORE_VER: ${{ github.event.inputs.core_version }}
        run: |
          CURRENT_VERSION=$(grep 'sdk_version=' gradle.properties | sed -E 's/sdk_version=([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          IFS='.' read -ra V <<< "${CURRENT_VERSION%%-*}"

          CURRENT_CORE=$(grep 'def javaSdkVersion' hackle-android-sdk/build.gradle | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          IFS='.' read -ra CURR_CORE <<< "$CURRENT_CORE"
          IFS='.' read -ra NEW_CORE <<< "$CORE_VER"

          if [ "${CURR_CORE[0]}.${CURR_CORE[1]}" = "${NEW_CORE[0]}.${NEW_CORE[1]}" ]; then
            NEW_PATCH=$((V[2] + 1))
            NEW_VERSION="${V[0]}.${V[1]}.$NEW_PATCH"
          else
            NEW_MINOR=$((V[1] + 1))
            NEW_VERSION="${V[0]}.$NEW_MINOR.0"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "core_sdk_name=hackle-java-sdk-$CORE_VER" >> $GITHUB_OUTPUT

  prepare-branch:
    needs: calculate-version
    uses: ./.github/workflows/create_dev_branch.yml
    with:
      new_version: ${{ needs.calculate-version.outputs.new_version }}
    secrets: inherit

  update-sdk:
    needs: [calculate-version, prepare-branch]
    runs-on: ubuntu-latest
    env:
      CORE_SDK_NAME: ${{ needs.calculate-version.outputs.core_sdk_name }}
      CORE_VER: ${{ github.event.inputs.core_version }}
      DEV_BRANCH: ${{ needs.prepare-branch.outputs.branch_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-branch.outputs.branch_name }}
          fetch-depth: 0

      - name: Validate input
        run: |
          if [[ ! "$CORE_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: core_version must be in X.Y.Z format"
            exit 1
          fi

      - name: Update Core SDK
        run: |
          sed -i -E "s/def javaSdkVersion = \"[0-9]*\.[0-9]*\.[0-9]*\"/def javaSdkVersion = \"$CORE_VER\"/g" hackle-android-sdk/build.gradle

      - name: Commit and push
        run: |
          FEATURE_BRANCH="feature/update-$CORE_SDK_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$FEATURE_BRANCH"
          git add .
          git commit -m "update $CORE_SDK_NAME"
          git push origin "$FEATURE_BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base "$DEV_BRANCH" \
            --title "[Automation] Update $CORE_SDK_NAME" \
            --body "## Description
          - Update hackle-sdk-common:$CORE_VER
          - Update hackle-sdk-core:$CORE_VER"
