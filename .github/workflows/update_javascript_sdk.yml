name: update javascript sdk

on:
  repository_dispatch:
    types: [update-javascript-sdk]

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Calculate version
        id: version
        run: |
          CURRENT_VERSION=$(sed -n -E 's/sdk_version=([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' gradle.properties)
          IFS='.' read -ra V <<< "${CURRENT_VERSION%%-*}"
          NEW_MINOR=$((V[1] + 1))
          NEW_VERSION="${V[0]}.$NEW_MINOR.0"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  prepare-branch:
    needs: calculate-version
    uses: ./.github/workflows/create_dev_branch.yml
    with:
      new_version: ${{ needs.calculate-version.outputs.new_version }}
    secrets: inherit

  update-sdk:
    needs: [calculate-version, prepare-branch]
    runs-on: ubuntu-latest
    env:
      JS_SDK_VERSION: ${{ github.event.client_payload.js_sdk_version }}

    steps:
      - name: Validate input
        run: |
          if [[ -z "$JS_SDK_VERSION" ]]; then
            echo "Error: js_sdk_version is required"
            exit 1
          fi
          if [[ ! "$JS_SDK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: js_sdk_version must be in X.Y.Z format"
            exit 1
          fi
          echo "JS SDK version: $JS_SDK_VERSION"

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-branch.outputs.branch_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download JS SDK from npm
        run: |
          npm pack "@hackler/javascript-sdk@$JS_SDK_VERSION" --pack-destination /tmp
          cd /tmp
          tar xzf hackler-javascript-sdk-*.tgz
          SOURCE_FILE="/tmp/package/lib/index.browser.umd.min.js"
          if [[ ! -f "$SOURCE_FILE" ]]; then
            echo "Error: Expected file not found at $SOURCE_FILE"
            echo "Package contents:"
            find /tmp/package -type f
            exit 1
          fi

      - name: Replace JS SDK file
        run: |
          cp /tmp/package/lib/index.browser.umd.min.js \
            "hackle-android-sdk/src/main/assets/hackle-javascript-sdk-${JS_SDK_VERSION}.min.js"
          ls "hackle-android-sdk/src/main/assets/hackle-javascript-sdk-${JS_SDK_VERSION}.min.js" || \
            { echo "Error: JS SDK file not found after copy"; exit 1; }
          find hackle-android-sdk/src/main/assets -name "hackle-javascript-sdk-*.min.js" \
            ! -name "hackle-javascript-sdk-${JS_SDK_VERSION}.min.js" -delete

      - name: Update version constant
        run: |
          sed -i -E "s/JAVASCRIPT_SDK_VERSION = \"[0-9]+\.[0-9]+\.[0-9]+\"/JAVASCRIPT_SDK_VERSION = \"$JS_SDK_VERSION\"/g" \
            hackle-android-sdk/src/main/java/io/hackle/android/ui/inappmessage/view/html/InAppMessageHtmlBridgeUserScript.kt

      - name: Commit and push
        run: |
          FEATURE_BRANCH="feature/update-hackle-javascript-sdk-$JS_SDK_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$FEATURE_BRANCH"
          git add \
            hackle-android-sdk/src/main/assets/ \
            hackle-android-sdk/src/main/java/io/hackle/android/ui/inappmessage/view/html/InAppMessageHtmlBridgeUserScript.kt
          git commit -m "chore: update @hackler/javascript-sdk@$JS_SDK_VERSION"
          git push origin "$FEATURE_BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEV_BRANCH: ${{ needs.prepare-branch.outputs.branch_name }}
        run: |
          gh pr create \
            --base "$DEV_BRANCH" \
            --title "[Automation] Update @hackler/javascript-sdk@$JS_SDK_VERSION" \
            --body "## Description
          - Update @hackler/javascript-sdk@$JS_SDK_VERSION"
